<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ola Strategy Knowledge Graph</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Top Search Bar -->
        <div id="top-bar">
            <div id="search-container">
                <input type="text" id="search-input" placeholder="Search nodes, links, or full text..." autocomplete="off">
                <div id="search-results" class="hidden"></div>
            </div>
        </div>

        <!-- Main Graph Area -->
        <div id="graph-container">
            <!-- D3 SVG will be injected here -->
        </div>

        <!-- Sliding Note Panel -->
        <div id="side-panel" class="hidden">
            <div id="panel-header">
                <h2 id="panel-title">Select a node</h2>
                <button id="close-btn">&times;</button>
            </div>
            <div id="note-content">
                <p>Click on a node to view its content.</p>
            </div>
        </div>
        
        <!-- Controls overlay -->
        <div id="controls">
            <h3>Strategy Graph</h3>
            <p>Nodes: <span id="node-count">0</span> | Edges: <span id="edge-count">0</span></p>
            
            <div class="toggle-container">
                <label>
                    <input type="checkbox" id="toggle-phantoms" checked>
                    Show Existing Files Only
                </label>
            </div>
            
            <div class="settings">
                <div id="settings-toggle"><span>⚙️</span> Display Settings</div>
                <div id="settings-content" class="hidden">
                    <label>Link Thickness 
                        <input type="range" id="setting-link-thickness" min="0.1" max="5" step="0.1" value="1.5">
                    </label>
                    <label>Text Fade Zoom 
                        <input type="range" id="setting-text-fade" min="0.1" max="3" step="0.1" value="0.6">
                    </label>
                    <label>Node Size 
                        <input type="range" id="setting-node-size" min="0.5" max="3" step="0.1" value="1">
                    </label>
                    <label>Color Mode 
                        <select id="setting-color-mode">
                            <option value="color">Colourful</option>
                            <option value="white">Plain White</option>
                        </select>
                    </label>
                </div>
            </div>

            <div class="legend" id="legend"></div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
